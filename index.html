<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>个人空间</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="个人空间">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="theme-color" content="#FAFAFA">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ====== 顶部导航栏 ====== -->
  <header class="app-header" id="appHeader">
    <div class="header-left">
      <div class="avatar avatar-sm" id="headerAvatar">👤</div>
      <span class="header-title" id="headerTitle">个人空间</span>
    </div>
    <button class="theme-btn" id="themeBtn" title="切换日间/夜间模式" aria-label="切换日间夜间模式">
      <svg id="themeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <!-- ====== 主内容区 ====== -->
  <main class="main-content" id="mainContent">

    <!-- ========== 记事（原备忘录） ========== -->
    <section class="tab-content active" id="tab-memo">
      <div class="toolbar">
        <input type="text" class="search-input" id="memoSearch" placeholder="🔍 搜索记事...">
        <select class="filter-select" id="memoCategoryFilter">
          <option value="all">全部分类</option>
          <option value="工作">工作</option><option value="生活">生活</option>
          <option value="学习">学习</option><option value="其他">其他</option>
        </select>
        <button class="btn btn-primary" id="addMemoBtn">＋ 新建</button>
      </div>

      <div class="memo-grid" id="memoGrid">
        <div class="empty-state" id="memoEmpty">
          <div class="empty-icon">📋</div>
          <p>还没有记事</p>
          <p class="empty-hint">点击「新建」开始记录</p>
        </div>
      </div>

      <!-- 记事弹窗 -->
      <div class="modal-overlay" id="memoModal">
        <div class="modal">
          <div class="modal-header">
            <h3 id="memoModalTitle">新建记事</h3>
            <button class="modal-close" id="closeMemoModal" aria-label="关闭弹窗">✕</button>
          </div>
          <div class="modal-body">
            <div class="form-group"><label>标题</label><input type="text" id="memoTitle" placeholder="记事标题"></div>
            <div class="form-group"><label>内容</label><textarea id="memoContent" rows="6" placeholder="写点什么..."></textarea></div>
            <div class="form-group"><label>分类</label>
              <select id="memoCategory"><option value="工作">工作</option><option value="生活">生活</option><option value="学习">学习</option><option value="其他">其他</option></select>
            </div>
            <div class="form-group"><label>颜色标签</label>
              <div class="color-picker" id="memoColorPicker">
                <span class="color-dot active" data-color="#4f46e5" style="background:#4f46e5"></span>
                <span class="color-dot" data-color="#059669" style="background:#059669"></span>
                <span class="color-dot" data-color="#d97706" style="background:#d97706"></span>
                <span class="color-dot" data-color="#dc2626" style="background:#dc2626"></span>
                <span class="color-dot" data-color="#7c3aed" style="background:#7c3aed"></span>
                <span class="color-dot" data-color="#0891b2" style="background:#0891b2"></span>
              </div>
            </div>
            <div class="form-group"><label>⏰ 日历提醒</label>
              <input type="datetime-local" id="memoReminder">
              <span class="helper-text">设置后可将记事添加到 iPhone 系统日历</span>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-danger" id="deleteMemoBtn" style="display:none;margin-right:auto;">🗑 删除</button>
            <button class="btn" id="cancelMemoBtn">取消</button>
            <button class="btn btn-primary" id="saveMemoBtn">保存</button>
          </div>
        </div>
      </div>
    </section>

    <!-- ========== 记账本 ========== -->
    <section class="tab-content" id="tab-accounting">
      <!-- 余额卡片 -->
      <div class="balance-cards">
        <div class="balance-card income"><span class="balance-label">📈 总收入</span><span class="balance-amount" id="totalIncome">¥0.00</span></div>
        <div class="balance-card expense"><span class="balance-label">📉 总支出</span><span class="balance-amount" id="totalExpense">¥0.00</span></div>
        <div class="balance-card balance"><span class="balance-label">💎 结余</span><span class="balance-amount" id="totalBalance">¥0.00</span></div>
      </div>

      <!-- 每日支出折线图 -->
      <div class="chart-card card" id="chartCard">
        <div class="chart-header">
          <h4>📊 每日支出趋势</h4>
          <select class="chart-range" id="chartRange">
            <option value="7">近7天</option><option value="14" selected>近14天</option><option value="30">近30天</option>
          </select>
        </div>
        <div class="chart-container">
          <svg class="spending-chart" id="spendingChart" viewBox="0 0 600 220" preserveAspectRatio="xMidYMid meet"></svg>
          <div class="chart-empty" id="chartEmpty" style="display:none;"><p>暂无支出数据</p></div>
        </div>
      </div>

      <!-- 筛选栏 -->
      <div class="toolbar">
        <select class="filter-select" id="monthFilter"><option value="all">全部月份</option></select>
        <select class="filter-select" id="typeFilter"><option value="all">全部类型</option><option value="income">收入</option><option value="expense">支出</option></select>
        <select class="filter-select" id="categoryFilter"><option value="all">全部分类</option><option value="工资">工资</option><option value="兼职">兼职</option><option value="餐饮">餐饮</option><option value="交通">交通</option><option value="购物">购物</option><option value="娱乐">娱乐</option><option value="居住">居住</option><option value="其他">其他</option></select>
        <button class="btn btn-primary" id="addTransactionBtn">＋ 记一笔</button>
      </div>

      <!-- 账单列表 -->
      <div class="transaction-list" id="transactionList">
        <div class="empty-state" id="transactionEmpty"><div class="empty-icon">💳</div><p>还没有账单记录</p><p class="empty-hint">点击「记一笔」开始记账</p></div>
      </div>

      <!-- 记账弹窗 -->
      <div class="modal-overlay" id="transactionModal">
        <div class="modal">
          <div class="modal-header"><h3 id="transactionModalTitle">记一笔</h3><button class="modal-close" id="closeTransactionModal" aria-label="关闭弹窗">✕</button></div>
          <div class="modal-body">
            <div class="form-group"><label>类型</label><div class="type-toggle"><button class="type-btn active" data-type="expense">🔴 支出</button><button class="type-btn" data-type="income">🟢 收入</button></div></div>
            <div class="form-group"><label>金额</label><input type="number" id="transactionAmount" placeholder="0.00" step="0.01" min="0"></div>
            <div class="form-group"><label>分类</label><select id="transactionCategory"><optgroup label="收入分类"><option value="工资">工资</option><option value="兼职">兼职</option><option value="其他收入">其他收入</option></optgroup><optgroup label="支出分类"><option value="餐饮" selected>餐饮</option><option value="交通">交通</option><option value="购物">购物</option><option value="娱乐">娱乐</option><option value="居住">居住</option><option value="其他支出">其他支出</option></optgroup></select></div>
            <div class="form-group"><label>日期</label><input type="date" id="transactionDate"></div>
            <div class="form-group"><label>备注</label><input type="text" id="transactionNote" placeholder="备注（可选）"></div>
          </div>
          <div class="modal-footer"><button class="btn btn-danger" id="deleteTransactionBtn" style="display:none;margin-right:auto;">🗑 删除</button><button class="btn" id="cancelTransactionBtn">取消</button><button class="btn btn-primary" id="saveTransactionBtn">保存</button></div>
        </div>
      </div>
    </section>

    <!-- ========== 个人资料 ========== -->
    <section class="tab-content" id="tab-profile">
      <div class="profile-card card">
        <div class="profile-header">
          <div class="avatar avatar-xl" id="profileAvatar">👤</div>
          <div class="profile-info">
            <h2 id="displayNickname">你的昵称</h2>
            <span class="mbti-badge" id="displayMbti">MBTI</span>
          </div>
        </div>
        <div class="profile-details">
          <div class="detail-group"><h4>💬 QQ</h4><p id="displayQq">未填写</p></div>
          <div class="detail-group"><h4>🎯 近期目标</h4><p id="displayGoal">未填写</p></div>
          <div class="detail-group"><h4>❤️ 爱好</h4><div class="skill-tags" id="displayHobbies"><span class="tag">未填写</span></div></div>
        </div>
        <button class="btn btn-primary" id="editProfileBtn" style="margin-top:26px;">✏️ 编辑资料</button>
      </div>

      <!-- 编辑资料弹窗 -->
      <div class="modal-overlay" id="profileModal">
        <div class="modal">
          <div class="modal-header"><h3>编辑个人资料</h3><button class="modal-close" id="closeProfileModal" aria-label="关闭弹窗">✕</button></div>
          <div class="modal-body">
            <div class="form-group"><label>头像 Emoji</label><input type="text" id="editAvatar" placeholder="选择一个 emoji"></div>
            <div class="form-group"><label>昵称</label><input type="text" id="editNickname" placeholder="你的昵称"></div>
            <div class="form-group"><label>QQ</label><input type="text" id="editQq" placeholder="QQ号码"></div>
            <div class="form-group"><label>MBTI</label>
              <select id="editMbti">
                <option value="">选择你的 MBTI</option>
                <option>INTJ</option><option>INTP</option><option>ENTJ</option><option>ENTP</option>
                <option>INFJ</option><option>INFP</option><option>ENFJ</option><option>ENFP</option>
                <option>ISTJ</option><option>ISFJ</option><option>ESTJ</option><option>ESFJ</option>
                <option>ISTP</option><option>ISFP</option><option>ESTP</option><option>ESFP</option>
              </select>
            </div>
            <div class="form-group"><label>爱好（逗号分隔）</label><input type="text" id="editHobbies" placeholder="摄影, 音乐, 旅行"></div>
            <div class="form-group"><label>近期目标</label><textarea id="editGoal" rows="4" placeholder="最近想达成的小目标..."></textarea></div>
          </div>
          <div class="modal-footer"><button class="btn" id="cancelProfileBtn">取消</button><button class="btn btn-primary" id="saveProfileBtn">保存</button></div>
        </div>
      </div>
    </section>

  </main>

  <!-- ====== 底部导航栏 — SVG 纯色图标 ====== -->
  <nav class="bottom-tabs" id="bottomTabs">
    <button class="bottom-tab active" data-tab="memo">
      <span class="bt-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg></span>
      <span class="bt-label">记事</span>
    </button>
    <button class="bottom-tab" data-tab="accounting">
      <span class="bt-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg></span>
      <span class="bt-label">记账</span>
    </button>
    <button class="bottom-tab" data-tab="profile">
      <span class="bt-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
      <span class="bt-label">资料</span>
    </button>
  </nav>

  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').then(() => console.log('✅ SW ready')).catch(err => console.log('SW failed:', err));
    }
  </script>
  <script>
    (function(){
      var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent),isSA=window.navigator.standalone;
      if(isIOS&&!isSA&&!localStorage.getItem('pwa-banner-dismissed')){
        window.addEventListener('load',function(){
          var b=document.createElement('div');b.id='ios-pwa-banner';
          b.innerHTML='<div style="position:fixed;bottom:110px;left:16px;right:16px;background:#1f2937;color:#fff;border-radius:16px;padding:16px 20px;z-index:999;font-size:14px;box-shadow:0 8px 30px rgba(0,0,0,.35);display:flex;align-items:center;gap:12px;"><span style="font-size:28px;">📱</span><span style="flex:1;">点击 <b>分享</b> → <b>添加到主屏幕</b>，像 App 一样使用</span><button onclick="this.parentElement.remove();localStorage.setItem(\'pwa-banner-dismissed\',\'1\')" style="background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer;">✕</button></div>';
          document.body.appendChild(b);
        });
      }
    })();
  </script>
</body>
</html>
