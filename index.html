<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>个人空间</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS Safari 全屏模式 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="个人空间">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- 主题色 -->
  <meta name="theme-color" content="#2563EB">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Google Fonts: Archivo + Space Grotesk (preconnect for performance) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 侧边栏导航 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="avatar avatar-lg" id="sidebarAvatar">👤</div>
      <h3 id="sidebarName">我的空间</h3>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-tab="profile">
        <span class="nav-icon">👤</span> 个人资料
      </button>
      <button class="nav-item" data-tab="memo">
        <span class="nav-icon">📝</span> 备忘录
      </button>
      <button class="nav-item" data-tab="accounting">
        <span class="nav-icon">💰</span> 记账本
      </button>
    </nav>

    <!-- 日夜模式切换（侧边栏内） -->
    <button class="theme-toggle-sidebar" id="themeToggleSidebar" title="切换日间/夜间模式">
      <span class="theme-icon">🌙</span> 夜间模式
    </button>
  </aside>

  <!-- 侧边栏折叠/展开按钮 -->
  <button class="sidebar-toggle" id="sidebarToggle" title="收起菜单" aria-label="收起侧边栏菜单">◀</button>

  <!-- 移动端：侧边栏遮罩 -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- 移动端：汉堡菜单按钮 -->
  <button class="mobile-menu-btn" id="mobileMenuBtn" title="菜单" aria-label="打开导航菜单">☰</button>

  <!-- 移动端：日夜模式切换 -->
  <button class="theme-toggle-mobile" id="themeToggleMobile" title="切换日间/夜间模式" aria-label="切换日间夜间模式">🌙</button>

  <!-- 移动端：底部导航栏 -->
  <nav class="bottom-tabs" id="bottomTabs">
    <button class="bottom-tab active" data-tab="profile">
      <span class="bt-icon">👤</span> 资料
    </button>
    <button class="bottom-tab" data-tab="memo">
      <span class="bt-icon">📝</span> 备忘
    </button>
    <button class="bottom-tab" data-tab="accounting">
      <span class="bt-icon">💰</span> 记账
    </button>
  </nav>

  <!-- 主内容区 -->
  <main class="main-content">

    <!-- ========== 个人资料 ========== -->
    <section class="tab-content active" id="tab-profile">
      <div class="page-header">
        <h1>个人资料</h1>
        <button class="btn btn-primary" id="editProfileBtn">✏️ 编辑资料</button>
      </div>

      <div class="profile-card card">
        <div class="profile-header">
          <div class="avatar avatar-xl" id="profileAvatar">👤</div>
          <div class="profile-info">
            <h2 id="displayName">你的名字</h2>
            <p id="displayTitle">职业 / 头衔</p>
            <p id="displayBio">这里写一段个人简介...</p>
          </div>
        </div>
        <div class="profile-details">
          <div class="detail-group">
            <h4>📧 联系方式</h4>
            <p id="displayEmail">email@example.com</p>
            <p id="displayPhone">未填写</p>
          </div>
          <div class="detail-group">
            <h4>🌐 社交链接</h4>
            <p id="displayGithub">未填写</p>
          </div>
          <div class="detail-group">
            <h4>🏷️ 技能标签</h4>
            <div class="skill-tags" id="displaySkills">
              <span class="tag">HTML</span>
              <span class="tag">CSS</span>
              <span class="tag">JavaScript</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 编辑资料弹窗 -->
      <div class="modal-overlay" id="profileModal">
        <div class="modal">
          <div class="modal-header">
            <h3>编辑个人资料</h3>
            <button class="modal-close" id="closeProfileModal" aria-label="关闭弹窗">✕</button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label>头像 Emoji</label>
              <input type="text" id="editAvatar" placeholder="选择一个 emoji，如 😊">
            </div>
            <div class="form-group">
              <label>姓名</label>
              <input type="text" id="editName" placeholder="你的名字">
            </div>
            <div class="form-group">
              <label>头衔</label>
              <input type="text" id="editTitle" placeholder="如：全栈开发者">
            </div>
            <div class="form-group">
              <label>个人简介</label>
              <textarea id="editBio" rows="3" placeholder="写一段简短的个人介绍..."></textarea>
            </div>
            <div class="form-group">
              <label>邮箱</label>
              <input type="email" id="editEmail" placeholder="email@example.com">
            </div>
            <div class="form-group">
              <label>手机</label>
              <input type="text" id="editPhone" placeholder="手机号码">
            </div>
            <div class="form-group">
              <label>GitHub</label>
              <input type="text" id="editGithub" placeholder="GitHub 用户名">
            </div>
            <div class="form-group">
              <label>技能标签（逗号分隔）</label>
              <input type="text" id="editSkills" placeholder="HTML, CSS, JavaScript">
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn" id="cancelProfileBtn">取消</button>
            <button class="btn btn-primary" id="saveProfileBtn">保存</button>
          </div>
        </div>
      </div>
    </section>

    <!-- ========== 备忘录 ========== -->
    <section class="tab-content" id="tab-memo">
      <div class="page-header">
        <h1>📝 备忘录</h1>
        <button class="btn btn-primary" id="addMemoBtn">＋ 新建备忘</button>
      </div>

      <div class="toolbar">
        <input type="text" class="search-input" id="memoSearch" placeholder="🔍 搜索备忘...">
        <select class="filter-select" id="memoCategoryFilter">
          <option value="all">全部分类</option>
          <option value="工作">工作</option>
          <option value="生活">生活</option>
          <option value="学习">学习</option>
          <option value="其他">其他</option>
        </select>
      </div>

      <div class="memo-grid" id="memoGrid">
        <!-- 空状态 -->
        <div class="empty-state" id="memoEmpty">
          <div class="empty-icon">📋</div>
          <p>还没有备忘录</p>
          <p class="empty-hint">点击「新建备忘」开始记录</p>
        </div>
      </div>

      <!-- 备忘编辑弹窗 -->
      <div class="modal-overlay" id="memoModal">
        <div class="modal">
          <div class="modal-header">
            <h3 id="memoModalTitle">新建备忘</h3>
            <button class="modal-close" id="closeMemoModal" aria-label="关闭弹窗">✕</button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label>标题</label>
              <input type="text" id="memoTitle" placeholder="备忘标题">
            </div>
            <div class="form-group">
              <label>内容</label>
              <textarea id="memoContent" rows="6" placeholder="写点什么..."></textarea>
            </div>
            <div class="form-group">
              <label>分类</label>
              <select id="memoCategory">
                <option value="工作">工作</option>
                <option value="生活">生活</option>
                <option value="学习">学习</option>
                <option value="其他">其他</option>
              </select>
            </div>
            <div class="form-group">
              <label>颜色标签</label>
              <div class="color-picker" id="memoColorPicker">
                <span class="color-dot active" data-color="#4f46e5" style="background:#4f46e5"></span>
                <span class="color-dot" data-color="#059669" style="background:#059669"></span>
                <span class="color-dot" data-color="#d97706" style="background:#d97706"></span>
                <span class="color-dot" data-color="#dc2626" style="background:#dc2626"></span>
                <span class="color-dot" data-color="#7c3aed" style="background:#7c3aed"></span>
                <span class="color-dot" data-color="#0891b2" style="background:#0891b2"></span>
              </div>
            </div>
            <div class="form-group">
              <label>⏰ 日历提醒</label>
              <input type="datetime-local" id="memoReminder" style="color:var(--gray-700);">
              <span style="font-size:12px;color:var(--gray-400);margin-top:4px;display:inline-block;">
                设置后可将备忘添加到 iPhone 系统日历，到时间自动弹通知
              </span>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-danger" id="deleteMemoBtn" style="display:none;margin-right:auto;">🗑 删除</button>
            <button class="btn" id="cancelMemoBtn">取消</button>
            <button class="btn btn-primary" id="saveMemoBtn">保存</button>
          </div>
        </div>
      </div>
    </section>

    <!-- ========== 记账本 ========== -->
    <section class="tab-content" id="tab-accounting">
      <div class="page-header">
        <h1>💰 记账本</h1>
        <button class="btn btn-primary" id="addTransactionBtn">＋ 记一笔</button>
      </div>

      <!-- 余额卡片 -->
      <div class="balance-cards">
        <div class="balance-card income">
          <span class="balance-label">📈 总收入</span>
          <span class="balance-amount" id="totalIncome">¥0.00</span>
        </div>
        <div class="balance-card expense">
          <span class="balance-label">📉 总支出</span>
          <span class="balance-amount" id="totalExpense">¥0.00</span>
        </div>
        <div class="balance-card balance">
          <span class="balance-label">💎 结余</span>
          <span class="balance-amount" id="totalBalance">¥0.00</span>
        </div>
      </div>

      <!-- 筛选栏 -->
      <div class="toolbar">
        <select class="filter-select" id="monthFilter">
          <option value="all">全部月份</option>
        </select>
        <select class="filter-select" id="typeFilter">
          <option value="all">全部类型</option>
          <option value="income">收入</option>
          <option value="expense">支出</option>
        </select>
        <select class="filter-select" id="categoryFilter">
          <option value="all">全部分类</option>
          <option value="工资">工资</option>
          <option value="兼职">兼职</option>
          <option value="餐饮">餐饮</option>
          <option value="交通">交通</option>
          <option value="购物">购物</option>
          <option value="娱乐">娱乐</option>
          <option value="居住">居住</option>
          <option value="其他">其他</option>
        </select>
      </div>

      <!-- 账单列表 -->
      <div class="transaction-list" id="transactionList">
        <div class="empty-state" id="transactionEmpty">
          <div class="empty-icon">💳</div>
          <p>还没有账单记录</p>
          <p class="empty-hint">点击「记一笔」开始记账</p>
        </div>
      </div>

      <!-- 记账弹窗 -->
      <div class="modal-overlay" id="transactionModal">
        <div class="modal">
          <div class="modal-header">
            <h3 id="transactionModalTitle">记一笔</h3>
            <button class="modal-close" id="closeTransactionModal" aria-label="关闭弹窗">✕</button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label>类型</label>
              <div class="type-toggle">
                <button class="type-btn active" data-type="expense">🔴 支出</button>
                <button class="type-btn" data-type="income">🟢 收入</button>
              </div>
            </div>
            <div class="form-group">
              <label>金额</label>
              <input type="number" id="transactionAmount" placeholder="0.00" step="0.01" min="0">
            </div>
            <div class="form-group">
              <label>分类</label>
              <select id="transactionCategory">
                <optgroup label="收入分类">
                  <option value="工资">工资</option>
                  <option value="兼职">兼职</option>
                  <option value="其他收入">其他收入</option>
                </optgroup>
                <optgroup label="支出分类">
                  <option value="餐饮" selected>餐饮</option>
                  <option value="交通">交通</option>
                  <option value="购物">购物</option>
                  <option value="娱乐">娱乐</option>
                  <option value="居住">居住</option>
                  <option value="其他支出">其他支出</option>
                </optgroup>
              </select>
            </div>
            <div class="form-group">
              <label>日期</label>
              <input type="date" id="transactionDate">
            </div>
            <div class="form-group">
              <label>备注</label>
              <input type="text" id="transactionNote" placeholder="备注（可选）">
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-danger" id="deleteTransactionBtn" style="display:none;margin-right:auto;">🗑 删除</button>
            <button class="btn" id="cancelTransactionBtn">取消</button>
            <button class="btn btn-primary" id="saveTransactionBtn">保存</button>
          </div>
        </div>
      </div>
    </section>

  </main>

  <script src="js/app.js"></script>

  <!-- 注册 Service Worker（离线缓存） -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('✅ Service Worker 已注册 — 支持离线使用'))
        .catch(err => console.log('Service Worker 注册失败:', err));
    }
  </script>

  <!-- iOS 添加到主屏幕引导 -->
  <script>
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const isStandalone = window.navigator.standalone;
    if (isIOS && !isStandalone && !localStorage.getItem('pwa-banner-dismissed')) {
      window.addEventListener('load', () => {
        const banner = document.createElement('div');
        banner.id = 'ios-pwa-banner';
        banner.innerHTML = `
          <div style="
            position:fixed;bottom:20px;left:16px;right:16px;
            background:#1f2937;color:#fff;border-radius:14px;
            padding:16px 20px;z-index:999;font-size:14px;
            box-shadow:0 8px 30px rgba(0,0,0,.3);
            display:flex;align-items:center;gap:12px;
          ">
            <span style="font-size:28px;">📱</span>
            <span style="flex:1;">点击下方 <b>分享按钮</b> → <b>添加到主屏幕</b>，像 App 一样使用</span>
            <button onclick="this.parentElement.remove();localStorage.setItem('pwa-banner-dismissed','1')"
              style="background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px 8px;">✕</button>
          </div>`;
        document.body.appendChild(banner);
      });
    }
  </script>
</body>
</html>
